services:
  - type: web
    name: ashirbad-enterprise
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: ashirbad_medical
      - key: SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9